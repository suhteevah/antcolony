[encyclopedia]
tagline = "North America's giant carpenter — slow to grow, spectacular at scale."
real_world_range = "Eastern North America from southern Canada down through the eastern United States to Florida and west to the Great Plains."
description = '''Camponotus pennsylvanicus is the largest and most familiar carpenter ant of eastern North America. Majors reach 12-14mm with massive mandibles; minors are 6-9mm. Both castes are matte black with a golden pubescence on the gaster that catches the light beautifully.

Unlike termites, carpenter ants do not eat wood — they excavate galleries in soft, moisture-damaged timber for nesting, producing fine sawdust kickouts (frass) that betray their presence. Colonies are fully claustral and notoriously slow in the first year; a keeper may see only 30-50 workers after 12 months. From year three onward growth accelerates, and mature colonies reach 2,000-10,000 with multiple satellite nests connected by trunk trails.

Foragers are primarily nocturnal, ranging widely for aphid honeydew and protein. A single Camponotus worker can travel 100+ meters from its nest in a night's forage.'''
fun_facts = [
    "Queens can live 20+ years, rivaling Lasius niger for lifespan in the hobby.",
    "Majors use their oversized heads to plug nest entrances — a behavior called phragmosis.",
    "They do not digest cellulose; the 'carpenter' name comes from nest excavation, not diet.",
    "Satellite nests let a single colony occupy multiple trees and structures simultaneously.",
    "Workers drum inside galleries to communicate alarm through the wood itself."
]
keeper_notes = '''A patience species. First-year queens produce tiny nanitic workers and the colony seems to stall for months — this is normal. Do not overfeed or the brood will mold. A test tube with cotton works for the first year; upgrade to a hydrated hybrid nest once worker count exceeds ~50.

Hibernation at 5-12 C from November through March is required. Skipping diapause will cause queens to stop laying and eventually die. Majors begin appearing once colony size exceeds about 100 workers.'''
