[encyclopedia]
tagline = "Desert seed-harvester with one of the most painful stings on the continent."
real_world_range = "Arid grasslands and shortgrass prairie of the western United States — Wyoming, Colorado, Utah, Nevada, and the Great Basin."
description = '''Pogonomyrmex occidentalis is the classic "red harvester ant" of the American West. Workers are 5-7mm, bright red-brown, and unmistakable on the large, cleared, pebble-topped mound disks that mark their nests in prairie and desert. A mature colony clears a bare circle up to two meters across around the entrance, a strategy for thermal regulation and easy chaff disposal.

The diet is predominantly seeds. Foragers run fixed trunk trails radiating from the mound, collecting grass and forb seeds that are husked underground in dedicated granary chambers. A mature colony stores many thousands of seeds and plays a large role in prairie plant dispersal.

Pogonomyrmex possess one of the most painful stings of any North American insect — Schmidt Pain Index 3.0, often described as "like drilling into your hand with a hot nail." The venom is also among the most toxic per-milligram of any arthropod. This is serious defensive equipment and must be respected in keeping.

Colonies are monogyne and strictly claustral. Queens emerge from synchronized summer nuptial flights, usually after the first heavy monsoon rains, and found new colonies in sandy soil. Growth is slow — a colony may take 4-5 years to reach mature population of 6,000-12,000 workers.'''
fun_facts = [
    "Schmidt Pain Index rating: 3.0 — one of the most painful stings of any North American insect.",
    "A single colony can clear a 2-meter bare disk around its mound entrance.",
    "Seeds stored in granaries can remain viable for years — the colony is effectively a living seed bank.",
    "Workers orient using polarized sunlight patterns to navigate the featureless prairie.",
    "Nuptial flights are timed to summer monsoon rains that soften the soil for founding queens."
]
keeper_notes = '''Not a beginner species — the sting alone earns the advanced rating. A single well-placed sting is intensely painful and can cause systemic reactions in sensitive individuals. Long tweezers and sealed outworlds are mandatory.

They also need a dry, arid setup unlike most hobby ants — over-humidified enclosures will mold brood rapidly. Offer mixed grass seeds (millet, chia, dandelion) as staple diet with occasional insect protein. Hibernation at 10-15 C through winter is required; in the wild they plug the mound and cluster deep.'''
